<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Kiribati Music Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; }
    body { background: linear-gradient(to bottom, #003366, #02101f); color: #fff; padding-bottom: 90px; }

    header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 24px; background: rgba(0,0,0,0.7);
      position: sticky; top: 0; z-index: 10; backdrop-filter: blur(8px);
    }

    .logo { font-weight: 800; color: #FFCC33; text-transform: uppercase; letter-spacing: 0.08em; display: flex; align-items: center; gap: 6px; }
    .logo-icon { font-size: 1.3rem; }

    nav a { margin-left: 16px; color: #fff; text-decoration: none; border-bottom: 2px solid transparent; font-size: 0.9rem; }
    nav a.active, nav a:hover { border-bottom-color: #FFCC33; }

    #app { padding: 24px; max-width: 1000px; margin: 0 auto; }
    .section-title { font-size: 1.7rem; margin-bottom: 8px; }
    .section-subtitle { opacity: 0.85; margin-bottom: 20px; }

    .artist-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px,1fr)); gap: 16px; }
    .artist-card {
      background: rgba(255,255,255,0.05); padding: 16px; border-radius: 12px;
      cursor: pointer; transition: transform 0.2s ease, box-shadow 0.2s ease;
      border: 1px solid rgba(255,255,255,0.08); animation: floatIn 0.4s ease;
    }
    .artist-card:hover { transform: translateY(-4px); box-shadow: 0 10px 25px rgba(0,0,0,0.5); }

    .artist-avatar { width: 64px; height: 64px; border-radius: 50%; object-fit: cover; margin-bottom: 8px; }
    .artist-name { font-weight: 600; }
    .artist-island { font-size: 0.8rem; opacity: 0.8; margin-bottom: 6px; }
    .tag { display: inline-block; font-size: 0.7rem; padding: 2px 8px; border-radius: 999px; background: rgba(255,204,51,0.15); color: #FFCC33; }

    .form-card {
      max-width: 420px; margin: 0 auto; background: rgba(255,255,255,0.05);
      padding: 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.08);
      animation: floatIn 0.4s ease;
    }
    .form-card label { display: block; font-size: 0.85rem; margin-top: 10px; }
    .form-card input, .form-card textarea {
      width: 100%; padding: 9px; margin-top: 4px; border-radius: 8px; border: none; font-size: 0.9rem;
    }

    .btn { background: #D91E18; color: #fff; border: none; border-radius: 999px; padding: 8px 16px; font-size: 0.85rem; cursor: pointer; }
    .btn-outline { background: none; border: 1px solid #FFCC33; color: #FFCC33; border-radius: 999px; padding: 8px 16px; font-size: 0.85rem; cursor: pointer; }

    .artist-detail-header { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
    .artist-detail-header img { width: 96px; height: 96px; border-radius: 50%; object-fit: cover; }

    .song-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 10px; border-radius: 8px; background: rgba(255,255,255,0.05); margin-bottom: 6px;
    }

    .player-bar {
      position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.9);
      height: 80px; display: flex; align-items: center; padding: 8px 16px; gap: 16px;
    }
    .player-info { display: flex; align-items: center; gap: 10px; }
    .player-info img { width: 56px; height: 56px; border-radius: 8px; object-fit: cover; background: #222; }

    .player-controls button {
      width: 32px; height: 32px; border-radius: 50%; border: 1px solid #555;
      background: none; color: white; cursor: pointer;
    }

    .player-extra { flex: 1; display: flex; gap: 8px; }

    @keyframes floatIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* small responsive tweaks */
    @media (max-width:600px) {
      .artist-detail-header { flex-direction: column; align-items: center; text-align: center; }
      .player-extra { display: none; }
    }
  </style>
</head>

<body>
<header>
  <div class="logo"><span class="logo-icon">🕊️</span> Kiribati Music Hub</div>
  <nav>
    <a href="#" data-view="home" class="nav-link active">Home</a>
    <a href="#" data-view="artists" class="nav-link">Artists</a>
    <a href="#" data-view="login" class="nav-link">Artist Login</a>
    <a href="#" data-view="about" class="nav-link">About</a>
  </nav>
</header>

<main id="app"></main>

<div class="player-bar">
  <div class="player-info">
    <img id="playerCover" src="" />
    <div>
      <div id="playerTitle">No track selected</div>
      <div id="playerArtist"></div>
    </div>
  </div>

  <div class="player-controls">
    <button id="prevBtn">⏮</button>
    <button id="playPauseBtn">▶</button>
    <button id="nextBtn">⏭</button>
  </div>

  <div class="player-extra">
    <input type="range" id="seekBar" min="0" max="100" />
    <input type="range" id="volumeBar" min="0" max="1" step="0.01" value="0.8" />
  </div>

  <audio id="audioElement"></audio>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import {
    getAuth,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    signOut,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import {
    getFirestore,
    collection,
    getDocs,
    doc,
    getDoc,
    setDoc,
    updateDoc
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
  import {
    getStorage,
    ref,
    uploadBytes,
    getDownloadURL
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB9Qfi9e-sSNE_qzCXfNyIuOddfOE3HIkA",
    authDomain: "kiribati-music-hub-57038.firebaseapp.com",
    projectId: "kiribati-music-hub-57038",
    storageBucket: "kiribati-music-hub-57038.firebasestorage.app",
    messagingSenderId: "673236054608",
    appId: "1:673236054608:web:0aee43fd20699df2d91755",
    measurementId: "G-7BFNK4Q0RX"
  };

  const appFirebase = initializeApp(firebaseConfig);
  const auth = getAuth(appFirebase);
  const db = getFirestore(appFirebase);
  const storage = getStorage(appFirebase);

  const app = document.getElementById("app");
  const navLinks = document.querySelectorAll(".nav-link");

  let currentView = "home";
  let currentArtist = null;
  let currentUser = null;
  let artists = [];

  function setActiveNav(view) {
    navLinks.forEach(l => l.classList.toggle("active", l.dataset.view === view));
  }

  navLinks.forEach(link => {
    link.addEventListener("click", e => {
      e.preventDefault();
      currentView = link.dataset.view;
      setActiveNav(currentView);
      render();
    });
  });

  function render() {
    if (currentView === "home") return renderHome();
    if (currentView === "artists") return renderArtists();
    if (currentView === "artistDetail") return renderArtistDetail();
    if (currentView === "about") return renderAbout();
    if (currentView === "login") return renderLogin();
    if (currentView === "dashboard") return renderDashboard();
  }

  function renderHome() {
    app.innerHTML = `
      <h1 class="section-title">Welcome to Kiribati Music Hub</h1>
      <p class="section-subtitle">A Firebase-powered music platform for iKiribati artists.</p>
      <p style="margin-top:12px;font-size:0.9rem;">
        🕊️ Frigate bird for freedom & culture<br>
        🌊 Ocean waves for connection across islands<br>
        🎵 Music as the heartbeat of Kiribati
      </p>
      <div style="margin-top:20px;display:flex;gap:10px;flex-wrap:wrap;">
        <button class="btn" onclick="setView('artists')">Browse Artists</button>
        <button class="btn-outline" onclick="setView('login')">Artist Login / Sign Up</button>
      </div>
    `;
  }

  async function loadArtists() {
    const snap = await getDocs(collection(db, "artists"));
    artists = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  }

  async function renderArtists() {
    await loadArtists();
    app.innerHTML = `
      <h1 class="section-title">Artists</h1>
      <p class="section-subtitle">Discover iKiribati musicians.</p>
      <div class="artist-grid">
        ${artists.map(a => `
          <article class="artist-card" onclick="openArtist('${a.id}')">
            <img src="${a.avatar || 'https://via.placeholder.com/150'}" class="artist-avatar" />
            <div class="artist-name">${a.name}</div>
            <div class="artist-island">🌴 ${a.island}</div>
            <span class="tag">${(a.genres || []).join(", ")}</span>
          </article>
        `).join("")}
      </div>
    `;
  }

  window.openArtist = async function(id) {
    const snap = await getDoc(doc(db, "artists", id));
    currentArtist = { id, ...snap.data() };
    currentView = "artistDetail";
    setActiveNav("artists");
    render();
  };

  function renderArtistDetail() {
    if (!currentArtist) {
      app.innerHTML = `<p>No artist selected.</p>`;
      return;
    }
    const a = currentArtist;
    const songs = a.songs || [];
    app.innerHTML = `
      <button class="btn-outline" onclick="setView('artists')">← Back</button>
      <div class="artist-detail-header" style="margin-top:12px;">
        <img src="${a.avatar || 'https://via.placeholder.com/150'}" />
        <div>
          <h2>${a.name}</h2>
          <p style="font-size:0.9rem;opacity:0.8;">🌴 ${a.island}</p>
          <p style="margin-top:6px;">${a.bio}</p>
          <p style="margin-top:6px;font-size:0.8rem;opacity:0.8;">Genres: ${(a.genres || []).join(", ")}</p>
        </div>
      </div>
      <h3 class="section-title" style="font-size:1.2rem;">Songs</h3>
      ${songs.length === 0 ? `<p>No songs yet.</p>` : songs.map((s,i)=>`
        <div class="song-item">
          <div>
            <div>${s.title}</div>
            <small style="opacity:0.7;">${a.name}</small>
          </div>
          <button class="btn" onclick="playSong(${i})">Play</button>
        </div>
      `).join("")}
    `;
  }

  function renderAbout() {
    app.innerHTML = `
      <h1 class="section-title">About</h1>
      <p class="section-subtitle">This is a Firebase-powered prototype of Kiribati Music Hub.</p>
      <p style="font-size:0.9rem;">Artists can sign up, edit profiles, upload songs, and share their music.</p>
    `;
  }

  function renderLogin() {
    app.innerHTML = `
      <h1 class="section-title">Artist Login / Sign Up</h1>
      <p class="section-subtitle">Create an account to upload your music.</p>
      <div class="form-card">
        <label>Email</label>
        <input type="email" id="authEmail" />
        <label>Password</label>
        <input type="password" id="authPassword" />
        <button class="btn" onclick="doLogin()">Login</button>
        <button class="btn-outline" onclick="doSignup()">Sign Up</button>
      </div>
    `;
  }

  window.doSignup = async function() {
    const email = document.getElementById("authEmail").value;
    const password = document.getElementById("authPassword").value;
    if (!email || !password) return alert("Enter email and password.");
    try {
      const userCred = await createUserWithEmailAndPassword(auth, email, password);
      const uid = userCred.user.uid;
      await setDoc(doc(db, "artists", uid), {
        name: email.split("@")[0],
        island: "Kiribati",
        bio: "New iKiribati artist.",
        avatar: "",
        genres: ["Island"],
        songs: []
      });
      currentUser = { uid, email };
      currentView = "dashboard";
      setActiveNav("login");
      render();
    } catch (err) {
      alert(err.message);
    }
  };

  window.doLogin = async function() {
    const email = document.getElementById("authEmail").value;
    const password = document.getElementById("authPassword").value;
    if (!email || !password) return alert("Enter email and password.");
    try {
      const userCred = await signInWithEmailAndPassword(auth, email, password);
      currentUser = { uid: userCred.user.uid, email };
      currentView = "dashboard";
      setActiveNav("login");
      render();
    } catch (err) {
      alert("Invalid login");
    }
  };

  window.doLogout = async function() {
    try {
      await signOut(auth);
    } catch (e) { /* ignore */ }
    currentUser = null;
    currentView = "home";
    setActiveNav("home");
    render();
  };

  async function renderDashboard() {
    if (!currentUser) {
      app.innerHTML = `<p>You must be logged in.</p>`;
      return;
    }
    const snap = await getDoc(doc(db, "artists", currentUser.uid));
    const artist = snap.exists() ? snap.data() : null;
    if (!artist) {
      app.innerHTML = `<p>Artist profile not found.</p>`;
      return;
    }
    const songs = artist.songs || [];
    app.innerHTML = `
      <h1 class="section-title">Artist Dashboard</h1>
      <p class="section-subtitle">Logged in as ${currentUser.email}</p>
      <button class="btn-outline" onclick="doLogout()">Logout</button>
      <h3 style="margin-top:20px;">Profile</h3>
      <div class="form-card" style="background:none;border:none;padding:0;">
        <label>Name</label>
        <input id="pName" value="${artist.name}">
        <label>Island</label>
        <input id="pIsland" value="${artist.island}">
        <label>Bio</label>
        <textarea id="pBio">${artist.bio}</textarea>
        <label>Avatar URL</label>
        <input id="pAvatar" value="${artist.avatar}">
        <button class="btn" onclick="saveProfile()">Save Profile</button>
      </div>
      <h3 style="margin-top:20px;">Songs</h3>
      ${songs.length === 0 ? `<p>No songs yet.</p>` : songs.map(s => `
        <div class="song-item">
          <div>
            <div>${s.title}</div>
            <small style="opacity:0.7;">${s.url}</small>
          </div>
        </div>
      `).join("")}
      <h3 style="margin-top:20px;">Add Song</h3>
      <div class="form-card" style="background:none;border:none;padding:0;">
        <label>Song Title</label>
        <input id="uTitle">
        <label>Upload MP3</label>
        <input type="file" id="songFile" accept="audio/*" />
        <button class="btn" onclick="addSong()">Upload Song</button>
      </div>
    `;
  }

  window.saveProfile = async function() {
    if (!currentUser) return alert("Not logged in.");
    const refDoc = doc(db, "artists", currentUser.uid);
    await updateDoc(refDoc, {
      name: document.getElementById("pName").value,
      island: document.getElementById("pIsland").value,
      bio: document.getElementById("pBio").value,
      avatar: document.getElementById("pAvatar").value
    });
    alert("Profile updated!");
    render();
  };

  window.addSong = async function() {
    if (!currentUser) return alert("Not logged in.");
    const fileInput = document.getElementById("songFile");
    const file = fileInput && fileInput.files && fileInput.files[0];
    const title = document.getElementById("uTitle").value.trim();
    if (!file) return alert("Choose a file.");
    if (!title) return alert("Enter a title.");
    const storageRef = ref(storage, `songs/${currentUser.uid}/${Date.now()}_${file.name}`);
    await uploadBytes(storageRef, file);
    const url = await getDownloadURL(storageRef);
    const artistRef = doc(db, "artists", currentUser.uid);
    const snap = await getDoc(artistRef);
    const artist = snap.data() || { songs: [] };
    const newSong = { title, url, cover: artist.avatar || "" };
    await updateDoc(artistRef, {
      songs: [...(artist.songs || []), newSong]
    });
    alert("Song uploaded!");
    render();
  };

  const audio = document.getElementById("audioElement");
  const playerTitle = document.getElementById("playerTitle");
  const playerArtist = document.getElementById("playerArtist");
  const playerCover = document.getElementById("playerCover");
  const playPauseBtn = document.getElementById("playPauseBtn");
  const prevBtn = document.getElementById("prevBtn");
  const nextBtn = document.getElementById("nextBtn");
  const seekBar = document.getElementById("seekBar");
  const volumeBar = document.getElementById("volumeBar");

  let currentPlaylist = [];
  let currentTrackIndex = -1;

  window.playSong = function(index) {
    currentPlaylist = currentArtist.songs || [];
    currentTrackIndex = index;
    loadTrack(true);
  };

  function loadTrack(autoplay) {
    if (!currentPlaylist.length || currentTrackIndex < 0) return;
    const track = currentPlaylist[currentTrackIndex];
    audio.src = track.url;
    playerTitle.textContent = track.title;
    playerArtist.textContent = currentArtist.name;
    playerCover.src = track.cover || currentArtist.avatar || "";
    if (autoplay) audio.play();
    updatePlayPauseButton();
  }

  function updatePlayPauseButton() {
    playPauseBtn.textContent = audio.paused ? "▶" : "⏸";
  }

  playPauseBtn.addEventListener("click", () => {
    if (!audio.src) return;
    if (audio.paused) audio.play(); else audio.pause();
    updatePlayPauseButton();
  });

  prevBtn.addEventListener("click", () => {
    if (!currentPlaylist.length) return;
    currentTrackIndex = (currentTrackIndex - 1 + currentPlaylist.length) % currentPlaylist.length;
    loadTrack(true);
  });

  nextBtn.addEventListener("click", () => {
    if (!currentPlaylist.length) return;
    currentTrackIndex = (currentTrackIndex + 1) % currentPlaylist.length;
    loadTrack(true);
  });

  audio.addEventListener("timeupdate", () => {
    if (!audio.duration) return;
    seekBar.value = (audio.currentTime / audio.duration) * 100;
  });

  seekBar.addEventListener("input", () => {
    if (!audio.duration) return;
    audio.currentTime = (seekBar.value / 100) * audio.duration;
  });

  volumeBar.addEventListener("input", () => {
    audio.volume = volumeBar.value;
  });

  audio.addEventListener("ended", () => {
    if (!currentPlaylist.length) return;
    currentTrackIndex = (currentTrackIndex + 1) % currentPlaylist.length;
    loadTrack(true);
  });

  window.setView = function(v) {
    currentView = v;
    setActiveNav(v);
    render();
  };

  onAuthStateChanged(auth, user => {
    if (user) {
      currentUser = { uid: user.uid, email: user.email };
    } else {
      currentUser = null;
    }
  });

  render();
</script>
</body>
</html>
